body:
  text: 三藏法師玄奘奉詔譯善業道品第六之一爾時金剛藏菩薩摩訶薩復白佛言大德世尊菩薩摩訶薩云何於聲聞乘得無誤失云何於聲聞乘補特伽羅得無誤失云何於獨覺乘得無誤失云何於獨覺乘補特伽羅得無誤失云何於大乘得無誤失云何於大乘補特伽羅得無誤失云何常能熾然三寶種姓云何於諸如來出家弟子若是法器若非法器下至一切被片袈裟剃鬚髮者得無誤失云何於大乘法常得升進無有退轉云何利慧勝福常得增長云何於一切定諸陀羅尼諸忍諸地速得自在無有退轉云何常得值遇諸善知識隨順而行云何常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧云何於諸善根常精進求心無厭足云何常於菩提種種行願心無厭足爾時世尊告金剛藏菩薩摩訶薩言善男子有菩薩摩訶薩十輪若菩薩摩訶薩成此十輪於聲聞乘得無誤失於聲聞乘補特伽羅得無誤失於獨覺乘得無誤失於獨覺乘補特伽羅得無誤失於其大乘得無誤失於其大乘補特伽羅得無誤失常能熾然三寶種姓於諸如來出家弟子若是法器若非法器下至一切被片袈裟剃鬚髮者得無誤失於大乘法常得升進無有退轉利慧勝福常得增長於一切定諸陀羅尼諸忍諸地速得自在無有退轉常得值遇諸善知識隨順而行常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧於諸善根常精進求心無厭足常於菩提種種行願心無厭足常於一切先所造作惡不善業以聖金剛堅利法智摧壞散滅令無遺餘不受果報更不造新惡不善業心無厭倦速能證得無上法輪常勤修習七覺分寶心無厭倦常能除滅一切衆生諸煩惱病心無厭倦一切衆生依止存活善男子如轉輪王具足七寶凡所行動輪寶導前餘寶隨後巡四大洲普能除滅一切衆生身心濁穢普能生長一切衆生身心安樂菩薩摩訶薩亦復如是成就十輪於聲聞乘得無誤失廣説乃至一切衆生依止存活善男子如大車輅具足四輪多人乘之遊行大路於其路上土塊瓦礫草木根莖枝葉華果為輪所輾皆悉摧壞不任受用菩薩摩訶薩亦復如是成就十輪悉能摧壞諸煩惱障諸有情障一切法障令不受報善男子如利劍輪才一投掣能斬怨敵首及支節令無勢用菩薩摩訶薩亦復如是成就十輪能破一切五趣牢獄生死大苦永斷一切煩惱惡業令不受報善男子如火災起五日出時遍四大洲一切河海水界津潤無不枯竭菩薩摩訶薩亦復如是成就十輪一切四因諸煩惱障諸有情障一切法障苦報根本悉皆枯竭善男子如風災起四方猛風俱時頓發一切世界大小諸山及諸大地悉皆散滅菩薩摩訶薩亦復如是成就十輪世間四倒憍慢諸山無不崩壞一切衆生諸煩惱障諸有情障一切法障苦報根本悉皆散滅善男子如師子王吼聲一發一切禽獸悉皆驚怖飛落走伏無敢輒動菩薩摩訶薩亦復如是成就十輪法音一震乃至一切外道異學惡知識等悉皆驚怖忘失言辨無敢酬抗善男子如天帝釋與阿素洛將欲戰時天軍圍繞手執金剛奔趣陳敵諸阿素洛驚怖退散菩薩摩訶薩亦復如是成就十輪一切倒見外道異學惡知識等驚怖退散善男子如如意珠置高幢上能雨種種上妙珍寶給施一切貧乏衆生菩薩摩訶薩亦復如是成就十輪處淨戒幢雨大法雨給施一切無量衆生善男子如暗夜分世間幽冥都無所見迷失正道滿月出已諸暗皆除諸失道者皆見正路菩薩摩訶薩亦復如是成就十輪若諸衆生無明昏暗由此迷失八支聖道菩薩為其宣説正法除無明暗生法光明開示顯現八支聖道令斷諸漏盡諸苦際善男子如大日殿出現世間一切苗稼悉皆增長一切花葉悉皆敷榮一切臭穢悉皆除歇諸穀果藥悉皆成熟雪山銷流諸河充溢漸次轉注滿於大海菩薩摩訶薩亦復如是成就十輪依止增上布施調伏寂靜尸羅安忍正勤靜慮般若方便慈悲辨才功德皆悉熾盛為諸衆生宣説正法由法威光令諸衆生種種增上善根苗稼悉皆增長種種增上妙行華葉悉皆敷榮種種煩惱惡業惡行悉皆除歇善趣涅槃諸穀果藥悉皆成熟邪見慢山悉皆銷流種種正信戒聞捨慧及諸定河無不充溢漸次盈滿大涅槃海令諸有情隨意所樂趣入無畏涅槃之城善男子云何名菩薩摩訶薩十輪善男子此十輪者非餘法也當知即是十善業道成就如是十種輪故得名菩薩摩訶薩也於一切惡皆能解脫一切善法隨意成就速能盈滿大涅槃海以大善巧方便智光成熟一切衆生之類皆令獲得利益安樂所以者何善男子過去一切諸佛世尊皆悉遠離十惡業道皆悉稱揚讚歎如是十善業道所得果報是故若能於此所説十善業道隨守護一乃至命終究竟無犯必獲一切殊勝果報如前後説善男子若菩薩摩訶薩能盡形壽遠離殺生即是施與一切衆生無驚無怖令諸衆生不生憂苦離毛竪畏由此善根速得成熟所有前際輪轉五趣沒生死河因殺生故造身語意諸惡業障諸煩惱障諸有情障一切法障諸壽命障自作教他見聞隨喜由此遠離殺生輪故皆悉輾壞摧滅無餘不受果報於現身中諸人天等皆共親愛無有猜慮身心安樂壽命長遠將命終時身心不為憂苦逼切所愛妻子眷屬圍繞臨命終時不見可怖剡魔王使唯見可意成調善法具戒富德真實福田為善知識身心歡悅深生敬信既命終已還生人中諸根圓滿支體具足隨所生處無病長壽端正聰明安隱快樂復遇可意成調善法具戒富德真實福田為善知識依彼修學離殺生法能斷一切惡不善法能成一切殊勝善法能求一切大乘法義能修一切菩薩願行漸次趣入深廣智海乃至證得無上菩提所居佛土離諸兵器無有怨害鬪戰之名絶諸怖畏安隱快樂一切無病長壽有情來生其國如來自壽無量無邊為諸有情如應説法般涅槃後正法久住利益安樂無量有情善男子是名菩薩摩訶薩第一遠離殺生輪也菩薩摩訶薩成就此輪故於聲聞乘得無誤失於聲聞乘補特伽羅得無誤失於獨覺乘得無誤失於獨覺乘補特伽羅得無誤失於其大乘得無誤失於其大乘補特伽羅得無誤失常能熾然三寶種性於諸如來出家弟子若是法器若非法器下至一切被片袈裟剃鬚髮者得無誤失於大乘法常得升進無有退轉利慧勝福常得增長於一切定諸陀羅尼諸忍諸地速得自在無有退轉常得值遇諸善知識隨順而行常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧於諸善根常精進求心無厭足常於菩提種種行願心無厭足所得果報廣如前説復次善男子若菩薩摩訶薩能盡形壽離不與取即是施與一切衆生無驚無怖無有熱惱亦無擾動於自所得如法財利喜足而住終不希求非法財利由此善根速得成熟所有前際輪轉五趣沒生死河因不與取造身語意諸惡業障諸煩惱障諸有情障一切法障諸財寶障自作教他見聞隨喜由此遠離不與取輪皆悉輾壞摧滅無餘不受果報於現身中諸人天等皆共親愛無所猜慮身心安樂財寶具足將命終時身心不為憂苦逼切所愛妻子眷屬圍繞臨命終時不見可怖剡魔王使唯見可意成調善法具戒富德真實福田為善知識身心歡悅深生敬信既命終已還生人中諸根圓滿支體具足隨所生處具大財寶端正聰明安隱快樂不與五家共諸財寶復遇可意成調善法具戒富德真實福田為善知識依彼修學離不與取能斷一切惡不善法能成一切殊勝善法能求一切大乘法義能修一切菩薩願行漸次趣入深廣智海乃至證得無上菩提所居佛土衆寶莊嚴寶樹寶池寶臺殿等無不充備離我我所無所攝受一切具足嚴飾有情來生其國如來自身壽命無量為諸有情如應説法般涅槃後正法久住利益安樂無量有情善男子是名菩薩摩訶薩第二遠離不與取輪菩薩摩訶薩成就此輪故於聲聞乘得無誤失於聲聞乘補特伽羅得無誤失於獨覺乘得無誤失於獨覺乘補特伽羅得無誤失於其大乘得無誤失於其大乘補特伽羅得無誤失常能熾然三寶種姓於諸如來出家弟子若是法器若非法器下至一切被片袈裟剃鬚髮者得無誤失於大乘法常得升進無有退轉利慧勝福常得增長於一切定諸陀羅尼諸忍諸地速得自在無有退轉常得值遇諸善知識隨順而行常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧於諸善根常精進求心無厭足常於菩提種種行願心無厭足所得果報廣説如前復次善男子若菩薩摩訶薩能盡形壽離欲邪行即是施與欲流所漂一切衆生無驚無怖無嫉無害無有熱惱亦無擾動於己妻室喜足而住終不希求非法色欲由此善根速得成熟所有前際輪轉五趣沒生死河因欲邪行造身語意諸惡業障諸煩惱障諸有情障一切法障諸室家障自作教他見聞隨喜由此遠離欲邪行輪皆悉輾壞摧滅無餘不受果報於現身中諸人天等皆共親愛無所猜慮身心安樂妻室貞良將命終時身心不為憂苦逼切所愛妻子眷屬圍繞臨命終時不見可怖剡魔王使唯見可意成調善法具戒富德真實福田為善知識身心歡悅深生敬信既命終已還生人中諸根圓滿支體具足隨所生處具諸眷屬端正聰明安隱快樂復遇可意成調善法具戒富德真實福田為善知識依彼修學離欲邪行能斷一切惡不善法能成一切殊勝善法能求一切大乘法義能修一切菩薩願行漸次趣入深廣智海乃至證得無上菩提所居佛土無諸女人離諸淫欲具足第一梵行有情來生其國一切有情皆受化生不處胞胎臭穢不淨如來自身壽命無量為諸有情如應説法般涅槃後正法久住利益安樂無量有情善男子是名菩薩摩訶薩第三遠離欲邪行輪菩薩摩訶薩成就此輪故於聲聞乘得無誤失於聲聞乘補特伽羅得無誤失於獨覺乘得無誤失於獨覺乘補特伽羅得無誤失於其大乘得無誤失於其大乘補特伽羅得無誤失常能熾然三寶種姓於諸如來出家弟子若是法器若非法器下至一切被片袈裟剃鬚髮者得無誤失於大乘法常得升進無有退轉利慧勝福常得增長於一切定諸陀羅尼諸忍諸地速得自在無有退轉常得值遇諸善知識隨順而行常得不離見一切佛及諸菩薩聲聞弟子不離聞法不離親近供養衆僧於諸善根常精進求心無厭足常於菩提種種行願心無厭足所得果報廣説如前復次善男子若菩薩摩訶薩能盡形壽離虛誑語一切衆生常共愛敬所出言詞皆誠諦量聞悉敬奉無所猜疑由此善根速得成熟所有前際輪轉五趣沒生死河因虛誑語造身語意諸惡業障諸煩惱障諸有情障一切法障諸信言障自作教他見聞隨喜由此遠離虛誑語輪皆悉輾壞摧滅無餘不受果報於現身中諸人天等皆共親愛無所猜慮身心安樂所出言詞他皆信奉將命終時身心不為憂苦逼切所愛妻子眷屬圍繞臨命終時不見可怖剡魔王使唯見可意成調善法具戒富德真實福田為善知識身心歡悅深生敬信既命終已還生人中諸根圓滿支體具足隨所生處所言誠諦端正聰明安隱快樂復遇可意成調善法具戒富德真實福田為善知識依彼修學離虛誑語能斷一切惡不善法能成一切殊勝善法能求一切大乘法義能修一切菩薩願行漸次趣入深廣智海乃至證得無上菩提所居佛土一切真實離諸虛偽妙香潔物之所莊嚴無諂無誑心行正真希求純淨善法有情來生其國香潔妙服寶飾莊嚴如來自身壽命無量為諸有情如應説法般涅槃後正法久住利益安樂無量有情善男子是名菩薩摩訶薩第四遠離虛誑語輪菩薩摩訶薩成就此輪故於聲聞乘得無誤失於聲聞乘補特伽羅得無誤失於獨覺乘